<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comparison Post</title>
    <!--
      BRAND COLORS: Edit the CSS variables below to match your persona.md brand colors.
      Default: #2ABFAB (teal). Change --brand-color to your brand color.
    -->
    <!-- Edit the text below to customize. Open in browser and screenshot for social media. -->
    <style>
        :root {
            --brand-color: #2ABFAB;
            --text-dark: #1a1a1a;
            --text-light: #666666;
            --bg-white: #ffffff;
            --old-way-bg: #f5f5f5;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background-color: #e8e8e8;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .comparison {
            width: 1080px;
            height: 1080px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .side {
            display: flex;
            flex-direction: column;
            padding: 50px 40px;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
        }

        .old-way {
            background-color: var(--old-way-bg);
            color: #999;
        }

        .new-way {
            background: linear-gradient(135deg, var(--bg-white) 0%, #f9f9f9 100%);
            color: var(--text-dark);
        }

        .divider {
            position: absolute;
            left: 50%;
            top: 0;
            width: 4px;
            height: 100%;
            background-color: var(--brand-color);
            transform: translateX(-50%);
        }

        .vs-badge {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            background-color: var(--brand-color);
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 700;
            z-index: 10;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
        }

        .side-label {
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
            opacity: 0.7;
        }

        .side-title {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 30px;
            line-height: 1.3;
        }

        .new-way .side-title {
            color: var(--brand-color);
        }

        .old-way .side-title {
            color: #999;
        }

        .points-list {
            text-align: left;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .point {
            font-size: 16px;
            line-height: 1.5;
            padding-left: 30px;
            position: relative;
        }

        .point::before {
            content: "•";
            position: absolute;
            left: 0;
            font-size: 24px;
            color: var(--brand-color);
            opacity: 0;
        }

        .new-way .point::before {
            opacity: 1;
        }

        .old-way .point {
            text-decoration: line-through;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="comparison">
        <div class="divider"></div>
        <div class="vs-badge">VS</div>

        <div class="side old-way">
            <div class="side-label">Old Way</div>
            <h2 class="side-title">Spray & Pray</h2>
            <div class="points-list">
                <p class="point">Broadcast to everyone</p>
                <p class="point">Guess at targeting</p>
                <p class="point">Hope for conversions</p>
                <p class="point">Slow feedback loop</p>
            </div>
        </div>

        <div class="side new-way">
            <div class="side-label">New Way</div>
            <h2 class="side-title">Data-Driven</h2>
            <div class="points-list">
                <p class="point">Precision targeting</p>
                <p class="point">Behavioral insights</p>
                <p class="point">Predictable results</p>
                <p class="point">Real-time optimization</p>
            </div>
        </div>
    </div>
</body>
</html>
