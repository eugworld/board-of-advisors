<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkedIn Carousel Slide</title>
    <!--
      BRAND COLORS: Edit the CSS variables below to match your persona.md brand colors.
      Default: #2ABFAB (teal). Change --brand-color to your brand color.
    -->
    <!-- Edit the text below to customize. Open in browser and screenshot for social media. -->
    <style>
        :root {
            --brand-color: #2ABFAB;
            --text-dark: #1a1a1a;
            --text-light: #666666;
            --bg-white: #ffffff;
            --border-color: #eeeeee;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background-color: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .slide {
            width: 1080px;
            height: 1080px;
            background-color: var(--bg-white);
            display: flex;
            flex-direction: column;
            padding: 60px 50px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
        }

        .slide-number {
            position: absolute;
            top: 30px;
            right: 40px;
            font-size: 14px;
            font-weight: 600;
            color: var(--brand-color);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .brand-accent {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background-color: var(--brand-color);
        }

        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 30px;
        }

        .title {
            font-size: 52px;
            font-weight: 700;
            color: var(--text-dark);
            line-height: 1.2;
            margin-bottom: 20px;
        }

        .title-accent {
            color: var(--brand-color);
        }

        .divider {
            width: 80px;
            height: 4px;
            background-color: var(--brand-color);
            border-radius: 2px;
            margin-bottom: 20px;
        }

        .body-text {
            font-size: 22px;
            color: var(--text-light);
            line-height: 1.6;
            max-width: 600px;
        }

        .footer {
            margin-top: auto;
            display: flex;
            align-items: center;
            gap: 15px;
            padding-top: 40px;
            border-top: 1px solid var(--border-color);
        }

        .brand-dot {
            width: 12px;
            height: 12px;
            background-color: var(--brand-color);
            border-radius: 50%;
        }

        .footer-text {
            font-size: 14px;
            color: var(--text-light);
        }
    </style>
</head>
<body>
    <div class="slide">
        <div class="brand-accent"></div>
        <div class="slide-number">01 / 08</div>

        <div class="content">
            <div>
                <h1 class="title">
                    The Future of
                    <span class="title-accent">Marketing</span>
                </h1>
                <div class="divider"></div>
            </div>

            <p class="body-text">
                AI is transforming how we create, target, and measure marketing campaigns. Here's what you need to know.
            </p>
        </div>

        <div class="footer">
            <div class="brand-dot"></div>
            <span class="footer-text">Marketing insights for 2026</span>
        </div>
    </div>
</body>
</html>
